<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0058be" />
      <stop offset="100%" stop-color="#002e6b" />
    </linearGradient>
    <linearGradient id="sparkleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#d8e2ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Smooth rounded background squircle -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <g filter="url(#glow)">
    <!-- Magnifying Glass -->
    <circle cx="230" cy="230" r="75" fill="none" stroke="url(#sparkleGrad)" stroke-width="32" stroke-linecap="round" />
    <line x1="283" y1="283" x2="360" y2="360" stroke="url(#sparkleGrad)" stroke-width="36" stroke-linecap="round" />
    
    <!-- Primary AI Sparkle (Top Right) -->
    <path d="M 340 90 Q 340 150 400 150 Q 340 150 340 210 Q 340 150 280 150 Q 340 150 340 90 Z" fill="url(#sparkleGrad)" />
    
    <!-- Secondary AI Sparkle (Bottom Left) -->
    <path d="M 140 300 Q 140 340 180 340 Q 140 340 140 380 Q 140 340 100 340 Q 140 340 140 300 Z" fill="#adc6ff" opacity="0.9" />
  </g>
</svg>
